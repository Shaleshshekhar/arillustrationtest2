<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bear AR Experience</title>

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="./engine/xr.js" data-preload-chunks="slam"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
    }

    /* Simple Splash & Loading Screen */
    #splashScreen {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #b09e75;
      text-align: center;
    }

    #title {
      font-size: 28px;
      letter-spacing: 0.15em;
      margin-bottom: 5px;
    }

    #subtitle {
      font-size: 12px;
      letter-spacing: 0.2em;
      opacity: 0.7;
      margin-bottom: 40px;
    }

    #startButton {
      border: 1.5px solid #b09e75;
      background: transparent;
      color: #b09e75;
      padding: 15px 40px;
      border-radius: 4px;
      font-size: 16px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #startButton:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #startButton:not(:disabled):hover {
      background: rgba(176, 158, 117, 0.15);
    }

    /* HUD Scan Status Prompts */
    #statusMessage {
      position: fixed;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      z-index: 99999;
      padding: 12px 24px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(176, 158, 117, 0.3);
      color: #b09e75;
      font-size: 14px;
      letter-spacing: 0.05em;
      display: none;
      pointer-events: none;
    }
  </style>

  <script src="./bundle.js"></script>
</head>

<body>

  <div id="splashScreen">
    <div id="title">WILDLIFE ARCHIVE</div>
    <div id="subtitle">BEAR OBSERVATION PROTOCOL</div>
    <button id="startButton" disabled>LOADING...</button>
  </div>

  <div id="statusMessage"></div>

  <a-scene
    xrextras-gesture-detector
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <video
        id="bearVideo"
        src="assets/arvideos/bear_video.mp4"
        preload="auto"
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>
        
    <a-light type="ambient" color="#ffffff" intensity="2.0"></a-light>

    <xrextras-named-image-target name="bear_target">
      <a-video
        id="videoPlane"
        src="#bearVideo"
        width="0.75"
        height="1.0"
        position="0 0 0"
        visible="false">
      </a-video>
    </xrextras-named-image-target>

    <a-camera position="0 4 10"></a-camera>
  </a-scene>

</body>
</html>
