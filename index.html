<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Multi-Target WebAR Video Experience</title>

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script async src="./engine/xr.js" data-preload-chunks="slam"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
    }

    /* Minimal Splash / Loading Screen */
    #splashScreen {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #b09e75;
      text-align: center;
    }

    #title {
      font-size: 28px;
      letter-spacing: 0.15em;
      margin-bottom: 5px;
    }

    #subtitle {
      font-size: 12px;
      letter-spacing: 0.2em;
      opacity: 0.7;
      margin-bottom: 40px;
    }

    #startButton {
      border: 1.5px solid #b09e75;
      background: transparent;
      color: #b09e75;
      padding: 15px 40px;
      border-radius: 4px;
      font-size: 16px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #startButton:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #startButton:not(:disabled):hover {
      background: rgba(176, 158, 117, 0.15);
    }

    /* Global Heads-Up Scanning Display Prompt */
    #statusMessage {
      position: fixed;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      z-index: 99999;
      padding: 12px 24px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(176, 158, 117, 0.3);
      color: #b09e75;
      font-size: 14px;
      letter-spacing: 0.05em;
      display: none;
      pointer-events: none;
    }
  </style>

  <script src="./bundle.js"></script>
</head>

<body>

  <div id="splashScreen">
    <div id="title">AR MULTI-TRACKER</div>
    <div id="subtitle">INITIALIZING TARGET ARRAYS</div>
    <button id="startButton" disabled>LOADING MEDIA BUFFERS...</button>
  </div>

  <div id="statusMessage"></div>

  <a-scene
    xrextras-gesture-detector
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true; maxTrackedImages: 4">

    <a-assets>
      <img id="bearThumb" src="image-targets/bear_target_luminance.jpg">
      <img id="crowThumb" src="image-targets/crow_target_luminance.jpg">
      <img id="donkeyThumb" src="image-targets/donkey_target_luminance.jpg">
      <img id="footballThumb" src="image-targets/Football_luminance.jpg">
      <img id="bookshopThumb" src="image-targets/Bookshop_luminance.jpg">
      <img id="crowsThumb" src="image-targets/crows_luminance.jpg">
      <img id="televisionThumb" src="image-targets/television_luminance.jpg">

      <video id="bearVideo" src="./assets/arvideos/bear_video.mp4" preload="auto" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="crowVideo" src="./assets/arvideos/crow_video.mp4" preload="auto" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="donkeyVideo" src="./assets/arvideos/donkey_video.mp4" preload="auto" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="footballVideo" src="./assets/arvideos/football_video.mp4" preload="auto" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="bookshopVideo" src="./assets/arvideos/bookshop_video.mp4" preload="auto" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="signVideo" src="./assets/arvideos/sign_video.mp4" preload="auto" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="crowsVideo" src="./assets/arvideos/crows_video.mp4" preload="auto" playsinline webkit-playsinline crossorigin="anonymous"></video>
      <video id="televisionVideo" src="./assets/arvideos/television_video.mp4" preload="auto" playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>
        
    <a-light type="ambient" color="#ffffff" intensity="2.0"></a-light>

    <xrextras-named-image-target name="bear_target">
      <xrextras-play-video video="#bearVideo" thumb="#bearThumb" width="0.5" height="1"></xrextras-play-video>
    </xrextras-named-image-target>

    <xrextras-named-image-target name="crow_target">
      <xrextras-play-video video="#crowVideo" thumb="#crowThumb" width="0.5" height="1"></xrextras-play-video>
    </xrextras-named-image-target>

    <xrextras-named-image-target name="donkey_target">
      <xrextras-play-video video="#donkeyVideo" thumb="#donkeyThumb" width="0.5" height="1"></xrextras-play-video>
    </xrextras-named-image-target>

    <xrextras-named-image-target name="Football">
      <xrextras-play-video video="#footballVideo" thumb="#footballThumb" width="0.5" height="1"></xrextras-play-video>
    </xrextras-named-image-target>

    <xrextras-named-image-target name="Bookshop">
      <xrextras-play-video video="#bookshopVideo" thumb="#bookshopThumb" width="0.5" height="1"></xrextras-play-video>
    </xrextras-named-image-target>

    <xrextras-named-image-target name="sign">
      <xrextras-play-video video="#signVideo" thumb="#bookshopThumb" width="0.5" height="1"></xrextras-play-video>
    </xrextras-named-image-target>

    <xrextras-named-image-target name="crows">
      <xrextras-play-video video="#crowsVideo" thumb="#crowsThumb" width="0.5" height="1"></xrextras-play-video>
    </xrextras-named-image-target>

    <xrextras-named-image-target name="television">
      <xrextras-play-video video="#televisionVideo" thumb="#televisionThumb" width="0.5" height="1"></xrextras-play-video>
    </xrextras-named-image-target>

    <a-camera position="0 4 10"></a-camera>
  </a-scene>

</body>
</html>
